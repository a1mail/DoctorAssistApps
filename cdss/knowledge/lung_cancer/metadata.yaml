scope:
  includes:
    - жалобы и анамнез
    - первичная диагностика и стадирование
    - морфологическая верификация
    - молекулярно-генетическое и иммуногистохимическое профилирование
    - НМРЛ: ранние, местнораспространенные и IV стадии
    - МРЛ: локализованная и распространенная стадии
    - поддерживающая и сопроводительная терапия
    - диспансерное наблюдение
  excludes:
    - автоматический расчет доз лекарств
    - замена врачебного решения
    - использование нероссийских гайдов как источника правил

engine_contract:
  patient_state_required_namespaces:
    - demographics
    - complaints
    - history
    - performance_status
    - diagnostics
    - histology
    - biomarkers
    - tnm
    - stage
    - treatment_intent
    - comorbidities
    - medications
  evaluation:
    deterministic: true
    immutable_state_during_evaluation: true
    explainability_required: true
    all_outputs_reference_rule_id: true
